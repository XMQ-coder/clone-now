name: 部署到 GitHub Pages

# 代码推送到 main 分支时自动触发
on:
  push:
    branches:
      - main

# 部署权限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装依赖并打包
        run: |
          npm install
          npm run build  # 生成 dist 文件夹

      - name: 上传静态文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: 部署到 GitHub Pages
        uses: actions/deploy-pages@v4